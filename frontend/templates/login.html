<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pakistan Navy Eligibility Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="{{ url_for('static', filename='assets/images/logo.png') }}" alt="Pakistan Navy Logo">
            </div>
            <h2>Welcome Back</h2>
            <p class="sub">Login to access your dashboard</p>

            <!-- Flash messages (e.g. "incorrect password") -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for m in messages %}
                        <div class="flash">{{ m }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- This form posts directly to the /login route -->
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-navy btn-block">Login</button>
            </form>

            <p class="switch">Don't have an account?
                <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>

</body>
</html>
